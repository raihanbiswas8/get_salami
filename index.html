<!DOCTYPE html>
<html>
<head>
    <title>Salami from Raihan</title>
    <style>
        body { text-align: center; font-family: 'Segoe UI', sans-serif; background: #2c3e50; color: white; margin-top: 50px; }
        .spinner-container { position: relative; display: inline-block; }
        .arrow { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 40px solid #e74c3c; z-index: 10; }
        canvas { border: 10px solid #ecf0f1; border-radius: 50%; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        #spin-btn { margin-top: 30px; padding: 15px 50px; font-size: 22px; font-weight: bold; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 50px; box-shadow: 0 4px #1e8449; }
        #spin-btn:disabled { background: #7f8c8d; cursor: not-allowed; }
        #result { margin-top: 25px; font-size: 28px; color: #f1c40f; min-height: 40px; }

        /* Pop-up Overlay */
        #form-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center; }
        #claim-form { background: #34495e; padding: 30px; border-radius: 15px; width: 320px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; font-size: 16px; }
        #submit-btn { background: #f1c40f; color: #2c3e50; font-weight: bold; padding: 12px 20px; border: none; cursor: pointer; width: 100%; border-radius: 5px; font-size: 18px; margin-top: 15px;}
    </style>
</head>
<body>

    <h1>Get Your Salami from Raihan🌙</h1>
    
    <div class="spinner-container">
        <div class="arrow"></div>
        <canvas id="wheel" width="450" height="450"></canvas>
    </div>

    <br>
    <button id="spin-btn">SPIN FOR SALAMI!</button>
    <div id="result"></div>

    <div id="form-overlay">
        <div id="claim-form">
            <h3>Claim Your Salami</h3>
            <p id="won-display" style="color: #f1c40f; font-size: 24px; font-weight: bold;"></p>
            <input type="text" id="userName" placeholder="Your Name" required>
            <input type="text" id="userPhone" placeholder="bKash Number (01XXXXXXXXX)" required>
            <button id="submit-btn">Submit Details</button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw8b5cvCcUwKN-xEPaaW3V2bDY4ilaz-jTG952utvZiBZqa4Ct2BMe_MVBWSE3A7wqeeQ/exec'; 

        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('spin-btn');
        const resDiv = document.getElementById('result');
        const overlay = document.getElementById('form-overlay');
        const wonDisplay = document.getElementById('won-display');

        // New Prize List
        const prizes = [6.9, 5.9, 7.9, 15.9, 4.9, 9.9, 69.69, 19.9, 12.25, 10.75];
        const colors = ['#f1c40f', '#e67e22', '#e74c3c', '#9b59b6', '#3498db', '#2ecc71', '#1abc9c', '#34495e', '#7f8c8d', '#d35400'];
        const prizeCount = prizes.length;
        const arc = (2 * Math.PI) / prizeCount;
        let totalRotation = 0;
        let currentWonAmount = 0;

        function drawWheel() {
            prizes.forEach((prize, i) => {
                const angle = i * arc;
                ctx.beginPath(); ctx.fillStyle = colors[i % colors.length]; ctx.moveTo(225, 225); ctx.arc(225, 225, 225, angle, angle + arc); ctx.lineTo(225, 225); ctx.fill();
                ctx.save(); ctx.translate(225, 225); ctx.rotate(angle + arc / 2); ctx.textAlign = "right"; ctx.fillStyle = "white"; ctx.font = "bold 15px Arial";
                ctx.fillText(prize + " TK", 210, 8); ctx.restore();
            });
        }

        btn.onclick = () => {
            btn.disabled = true;
            resDiv.innerText = "Good luck...";

            // Track spin count in local storage
            let spinCount = parseInt(localStorage.getItem('total_spins') || '0') + 1;
            localStorage.setItem('total_spins', spinCount);

            let targetIndex;
            // Requirement: 69.69 (Index 6) on the 20th spin
            if (spinCount === 20) {
                targetIndex = 6; 
            } else {
                // Otherwise, pick a random index EXCEPT 6 (to keep 69.69 rare/locked)
                // If you want 69.69 to be possible before 20, just use: Math.floor(Math.random() * prizeCount)
                do {
                    targetIndex = Math.floor(Math.random() * prizeCount);
                } while (targetIndex === 6); 
            }

            currentWonAmount = prizes[targetIndex];
            const spins = 6 * 360; 
            const degreesPerSegment = 360 / prizeCount;
            const targetCenterAngle = (targetIndex * degreesPerSegment) + (degreesPerSegment / 2);
            const finalAngle = spins + (270 - targetCenterAngle);
            
            totalRotation += (finalAngle - (totalRotation % 360)) + 360;
            canvas.style.transform = `rotate(${totalRotation}deg)`;

            setTimeout(() => {
                resDiv.innerText = `🎉 You won ${currentWonAmount} TK!`;
                wonDisplay.innerText = `${currentWonAmount} TK`;
                overlay.style.display = "flex";
            }, 4000);
        };

        document.getElementById('submit-btn').onclick = function() {
    const name = document.getElementById('userName').value.trim();
    const phone = document.getElementById('userPhone').value.trim();
    const submitBtn = this;

    // 1. Validation
    const bkashRegex = /^01[3-9]\d{8}$/; 
    if (name.length < 2) {
        alert("Please enter your name.");
        return;
    }
    if (!bkashRegex.test(phone)) {
        alert("Please enter a valid 11-digit bKash number.");
        return;
    }

    // 2. UI Update during submission
    submitBtn.innerText = "Processing...";
    submitBtn.disabled = true;

    // 3. Send to Google Sheet
    fetch(scriptURL, {
        method: 'POST',
        mode: 'no-cors', 
        cache: 'no-cache',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
            name: name, 
            phone: phone, 
            amount: currentWonAmount + " TK" 
        })
    })
    .then(() => {
        // --- THE UPDATED WELCOME / SUCCESS MESSAGE ---
        resDiv.innerHTML = "✅ Salami Request Successful!";
        
        document.getElementById('claim-form').innerHTML = `
            <div style="text-align:center; padding: 10px;">
                <h2 style="color: #27ae60; margin-bottom: 10px;">🎉 Congratulations, ${name}!</h2>
                <p style="font-size: 18px; line-height: 1.5;">
                    Your salami of <strong>${currentWonAmount} TK</strong> will be sent to 
                    <span style="color: #f1c40f;">${phone}</span> soon.
                </p>
                <hr style="border: 0; border-top: 1px solid #5d6d7e; margin: 20px 0;">
                <p style="font-style: italic; color: #bdc3c7;">
                    "Don't forget to share after receiving your salami!"
                </p>
                <button onclick="location.reload()" style="margin-top:15px; background:transparent; border:1px solid #fff; color:#fff; padding:5px 15px; border-radius:5px; cursor:pointer;">Close</button>
            </div>`;
        
        // Mark as claimed so they can't spin again
        localStorage.setItem('salami_claimed', 'true');
    })
    .catch(err => {
        alert("Submission failed. Check your internet connection.");
        submitBtn.disabled = false;
        submitBtn.innerText = "Submit Details";
    });
};

        drawWheel();
    </script>
</body>
</html>
