<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Salami from Raihan🌙</title>
    <style>
        body { 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #2c3e50; 
            color: white; 
            margin: 0; 
            padding-top: 50px; 
        }

        .spinner-container { 
            position: relative; 
            display: inline-block; 
            margin-bottom: 20px;
        }

        /* Grayed out wheel */
        canvas { 
            border: 12px solid #7f8c8d; 
            border-radius: 50%; 
            background: #ecf0f1; 
            filter: grayscale(100%) opacity(0.4); /* Makes it look "Off" */
            max-width: 90vw;
            max-height: 90vw;
        }

        /* Message Box */
        .closed-box {
            background: #c0392b;
            padding: 30px;
            border-radius: 15px;
            width: 80%;
            max-width: 400px;
            margin: 20px auto;
            border: 3px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            animation: shake 0.5s ease-in-out infinite alternate;
        }

        @keyframes shake {
            from { transform: rotate(-1deg); }
            to { transform: rotate(1deg); }
        }

        h2 { font-size: 28px; margin: 0; }
        p { font-size: 18px; margin-top: 10px; opacity: 0.9; }

        #spin-btn { 
            margin-top: 20px; 
            padding: 15px 50px; 
            font-size: 20px; 
            font-weight: bold; 
            background: #7f8c8d; 
            color: #bdc3c7; 
            border: none; 
            border-radius: 50px; 
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1>🌙 Eid Salami Spinner</h1>
    
    <div class="spinner-container">
        <canvas id="wheel" width="450" height="450"></canvas>
    </div>

    <div class="closed-box">
        <h2>গরীব হয়ে গেছি, আজ আর নয়! 💸</h2>
        <p>সব সালামি শেষ। আবার দেখা হবে ইনশাআল্লাহ্।</p>
    </div>

    <button id="spin-btn" disabled>CLOSED</button>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');

        // The same prize list for the visual effect
        const prizes = [6.9, 5.9, 7.9, 15.9, 4.9, 9.9, 69.69, 19.9, 12.25, 10.75];
        const colors = ['#bdc3c7', '#95a5a6', '#7f8c8d', '#ced4da']; // Dull colors
        const prizeCount = prizes.length;
        const arc = (2 * Math.PI) / prizeCount;

        function drawWheel() {
            prizes.forEach((prize, i) => {
                const angle = i * arc;
                ctx.beginPath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.moveTo(225, 225);
                ctx.arc(225, 225, 225, angle, angle + arc);
                ctx.lineTo(225, 225);
                ctx.fill();

                ctx.save();
                ctx.translate(225, 225);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#2c3e50";
                ctx.font = "bold 15px Arial";
                ctx.fillText(prize + " TK", 210, 8);
                ctx.restore();
            });
        }

        drawWheel();
    </script>
</body>
</html>
